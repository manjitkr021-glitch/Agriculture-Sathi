<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Intelligence for Farmers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #0a1a14, #050a0f);
            color: #e2e8f0;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-gradient {
            background: linear-gradient(135deg, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-item:hover {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
        }
        .sidebar-item.active {
            background: linear-gradient(to right, rgba(74, 222, 128, 0.2), transparent);
            color: #4ade80;
            border-left: 3px solid #4ade80;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            border-color: rgba(74, 222, 128, 0.3);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-full md:w-64 glass-dark h-screen sticky top-0 p-6 flex flex-col gap-8 z-50 transition-all duration-300">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-gradient-to-br from-green-400 to-blue-500 rounded-lg">
                <i data-lucide="sprout" class="text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Agri<span class="text-green-400">Mitra</span></h1>
        </div>

        <nav class="flex-1 flex flex-col gap-2">
            <button onclick="navigate('home')" class="sidebar-item active flex items-center gap-3 p-3 rounded-xl transition-all" data-page="home">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </button>
            <button onclick="navigate('assistant')" class="sidebar-item flex items-center gap-3 p-3 rounded-xl transition-all" data-page="assistant">
                <i data-lucide="bot" class="w-5 h-5"></i> AI Assistant
            </button>
            <button onclick="navigate('irrigation')" class="sidebar-item flex items-center gap-3 p-3 rounded-xl transition-all" data-page="irrigation">
                <i data-lucide="droplets" class="w-5 h-5"></i> Smart Irrigation
            </button>
            <button onclick="navigate('disease')" class="sidebar-item flex items-center gap-3 p-3 rounded-xl transition-all" data-page="disease">
                <i data-lucide="microscope" class="w-5 h-5"></i> Disease Detection
            </button>
            <button onclick="navigate('weather')" class="sidebar-item flex items-center gap-3 p-3 rounded-xl transition-all" data-page="weather">
                <i data-lucide="cloud-sun" class="w-5 h-5"></i> Weather & Market
            </button>
            <button onclick="navigate('schemes')" class="sidebar-item flex items-center gap-3 p-3 rounded-xl transition-all" data-page="schemes">
                <i data-lucide="file-text" class="w-5 h-5"></i> Govt Schemes
            </button>
        </nav>

        <div class="mt-auto p-4 glass rounded-2xl">
            <div class="flex items-center gap-3 mb-3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Farmer" class="w-10 h-10 rounded-full border-2 border-green-400" alt="Farmer">
                <div>
                    <p class="text-sm font-semibold">Rajesh Kumar</p>
                    <p class="text-xs text-gray-400">Punjab, IN</p>
                </div>
            </div>
            <div class="flex justify-between items-center">
                <button id="langToggle" class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30">EN/हिन्दी</button>
                <i data-lucide="log-out" class="w-4 h-4 text-gray-400 cursor-pointer hover:text-red-400"></i>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 p-4 md:p-10 relative">
        <!-- Top Navigation (Mobile/Extra Info) -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 id="page-title" class="text-3xl font-bold text-white">Smart Farming Overview</h2>
                <p id="page-subtitle" class="text-gray-400">Monitoring your fields in real-time</p>
            </div>
            <div class="flex gap-4">
                <div class="hidden md:flex flex-col items-end">
                    <p class="text-sm font-semibold">24°C</p>
                    <p class="text-xs text-green-400">Good for Sowing</p>
                </div>
                <button class="p-3 glass rounded-full hover:bg-white/10 transition-all">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div id="content-area">
            <!-- Dynamic content will be injected here -->
        </div>
    </main>

    <script src="frontend/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
